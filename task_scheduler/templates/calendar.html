{% extends "base.html" %}
{% block page_title %}📅 Calendar{% endblock %}

{% block content %}
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Total Tasks</div>
    <div class="stat-value">{{ total }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Completed</div>
    <div class="stat-value">{{ completed }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">In Progress</div>
    <div class="stat-value">{{ in_progress }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Overdue</div>
    <div class="stat-value overdue">{{ overdue }}</div>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div id="calendar-grid"></div>
  </div>
  <div class="card" id="day-detail">
    <h2 id="selected-date-label">Select a date</h2>
    <div id="day-tasks">Click a date to see tasks.</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const allTasks = {{ tasks | tojson | safe }};
const taskMap = {};
allTasks.forEach(t => {
  if (t.due_date) {
    if (!taskMap[t.due_date]) taskMap[t.due_date] = [];
    taskMap[t.due_date].push(t);
  }
});

function renderCalendar(year, month) {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const today = new Date();

  let html = `<div class="cal-header">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span>${months[month]} ${year}</span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="cal-grid">`;

  days.forEach(d => { html += `<div class="cal-day-name">${d}</div>`; });
  for (let i = 0; i < offset; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
    const hasTasks = taskMap[dateStr];
    let dots = '';
    if (hasTasks) {
      const colors = {'High':'#f87171','Medium':'#fb923c','Low':'#4ade80'};
      hasTasks.slice(0,3).forEach(t => {
        dots += `<span class="dot" style="background:${colors[t.priority]||'#94a3b8'}"></span>`;
      });
    }
    html += `<div class="cal-cell${isToday?' today':''}" onclick="showDay('${dateStr}', ${d})">${d}${dots}</div>`;
  }
  html += `</div>`;
  document.getElementById('calendar-grid').innerHTML = html;
}

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar(currentYear, currentMonth);
}

function showDay(dateStr, day) {
  document.getElementById('selected-date-label').textContent = dateStr;
  const tasks = taskMap[dateStr] || [];
  if (!tasks.length) {
    document.getElementById('day-tasks').innerHTML = '<p class="empty-state">No tasks on this day.</p>';
    return;
  }
  const colors = {'High':'high','Medium':'medium','Low':'low'};
  document.getElementById('day-tasks').innerHTML = tasks.map(t => `
    <div class="task-item">
      <div class="task-info">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          ${t.start_time ? '⏰ '+t.start_time+'–'+t.end_time : ''} 📅 Due today
        </div>
      </div>
      <span class="badge badge-${colors[t.priority]||'medium'}">${t.priority}</span>
    </div>`).join('');
}

renderCalendar(currentYear, currentMonth);
</script>
{% endblock %}
