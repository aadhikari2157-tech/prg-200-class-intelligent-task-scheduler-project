<!DOCTYPE html>
<html>
<head>
  <title>Register – TaskAssigner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="logo" style="justify-content:center;margin-bottom:24px">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">TaskAssigner</span>
    </div>
    <h2>Create account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" class="input" required/>
      <input type="email" name="email" placeholder="Email" class="input" required/>
      <input type="password" name="password" placeholder="Password" class="input" required/>
      <button type="submit" class="btn-primary full-width">Register</button>
    </form>
    <p style="text-align:center;margin-top:16px">
      Have an account? <a href="{{ url_for('auth.login') }}">Login</a>
    </p>
  </div>
</body>
</html>
